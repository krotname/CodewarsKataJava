version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 10
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    target-branch: master
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    open-pull-requests-limit: 10
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: master
    open-pull-requests-limit: 10
